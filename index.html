<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>District → ZIP Lookup | Techne Media</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #010101; --surface: #111111; --surface2: #1a1a1a;
    --border: #2a2a2a; --border2: #333333;
    --text: #f0ede6; --text2: #8c8c8c; --text3: #4a4a4a;
    --accent: #d99e32; --accent-dim: #2a1f08;
    --green: #2ecc8a; --green-dim: #0d2e20;
    --yellow: #d99e32; --yellow-dim: #2a1f08;
    --red: #f05252; --red-dim: #2a1010;
    --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans', sans-serif;
  }
  body { background:var(--bg); color:var(--text); font-family:var(--sans); font-size:14px; min-height:100vh; padding:40px 24px; line-height:1.5; }
  .wrap { max-width:880px; margin:0 auto; }
  .header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:36px; gap:16px; }
  .eyebrow { font-family:var(--mono); font-size:10px; letter-spacing:.12em; color:var(--accent); text-transform:uppercase; margin-bottom:6px; }
  h1 { font-size:26px; font-weight:600; color:#fff; letter-spacing:-.02em; line-height:1.2; }
  .sub { font-size:13px; color:var(--text2); margin-top:5px; }
  .logo { height: 28px; width: auto; margin-bottom: 12px; display: block; opacity: 0.85; }
  .logo { height:80px; width:auto; margin-bottom:14px; display:block; mix-blend-mode:screen; }
  .ver-badge { font-family:var(--mono); font-size:10px; color:var(--text3); border:1px solid var(--border2); padding:3px 8px; border-radius:4px; white-space:nowrap; margin-top:4px; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:22px 24px; margin-bottom:16px; }
  .field-label { font-family:var(--mono); font-size:10px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--text2); margin-bottom:8px; display:block; }
  textarea { width:100%; background:var(--bg); border:1px solid var(--border2); border-radius:6px; color:var(--text); font-family:var(--mono); font-size:13px; padding:12px 14px; resize:vertical; min-height:90px; outline:none; transition:border-color .15s; line-height:1.7; }
  textarea:focus { border-color:var(--accent); }
  textarea::placeholder { color:var(--text3); }
  .hint-row { display:flex; align-items:flex-start; gap:20px; margin-top:10px; flex-wrap:wrap; }
  .hint { font-size:12px; color:var(--text3); }
  .format-chips { display:flex; gap:6px; flex-wrap:wrap; }
  .chip { font-family:var(--mono); font-size:11px; background:var(--surface2); border:1px solid var(--border2); color:var(--text2); padding:2px 8px; border-radius:3px; cursor:pointer; transition:all .12s; }
  .chip:hover { border-color:var(--accent); color:var(--accent); }
  .btn-row { display:flex; gap:8px; margin-top:16px; align-items:center; flex-wrap:wrap; }
  button { font-family:var(--sans); font-size:13px; font-weight:600; border:none; border-radius:5px; padding:9px 18px; cursor:pointer; transition:all .12s; display:inline-flex; align-items:center; gap:6px; }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-primary:hover { background:#3a6de8; }
  .btn-primary:disabled { background:var(--surface2); color:var(--text3); cursor:not-allowed; }
  .btn-ghost { background:transparent; color:var(--text2); border:1px solid var(--border2); }
  .btn-ghost:hover { border-color:var(--border); color:var(--text); }
  .btn-dl { background:var(--green-dim); color:var(--green); border:1px solid #1a5c3f; margin-left:auto; }
  .btn-dl:hover { background:#0f3d28; }
  .status { font-size:13px; padding:10px 14px; border-radius:6px; margin-top:12px; display:none; font-family:var(--mono); line-height:1.8; }
  .status.show { display:block; }
  .status.loading { background:var(--accent-dim); color:#d99e32; border:1px solid #3d2a06; }
  .status.error { background:var(--red-dim); color:#fca5a5; border:1px solid #6b1c1c; }
  .status.success { background:var(--green-dim); color:#86efac; border:1px solid #14532d; }
  .status.warn { background:var(--yellow-dim); color:#fde68a; border:1px solid #713f12; }
  .spinner { display:inline-block; width:11px; height:11px; border:2px solid #2a1f08; border-top-color:#d99e32; border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; margin-right:4px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .progress-bar-wrap { background:var(--accent-dim); border-radius:3px; height:4px; margin-top:8px; overflow:hidden; }
  .progress-bar { background:var(--accent); height:100%; border-radius:3px; transition:width .3s ease; width:0%; }
  .results-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:10px; }
  .results-title { font-size:13px; font-weight:600; color:var(--text); display:flex; align-items:center; gap:8px; }
  .pill { font-family:var(--mono); font-size:10px; padding:2px 8px; border-radius:3px; background:var(--accent-dim); color:var(--accent); border:1px solid #3d2a06; }
  .pill.green { background:var(--green-dim); color:var(--green); border-color:#14532d; }
  .district-tags { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px; }
  .dtag { font-family:var(--mono); font-size:11px; padding:3px 10px; border-radius:3px; background:var(--surface2); border:1px solid var(--border2); color:var(--text2); display:flex; align-items:center; gap:6px; }
  .dtag .count { color:var(--text3); }
  .dtag.empty { border-color:#6b1c1c; color:var(--red); }
  .table-wrap { overflow-x:auto; border-radius:6px; border:1px solid var(--border); max-height:420px; overflow-y:auto; }
  table { width:100%; border-collapse:collapse; font-family:var(--mono); font-size:13px; }
  th { background:var(--surface2); color:var(--text2); font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.08em; padding:9px 16px; text-align:left; border-bottom:1px solid var(--border); white-space:nowrap; border-right:1px solid var(--border); position:sticky; top:0; }
  th:last-child { border-right:none; }
  td { padding:5px 16px; color:var(--text); border-bottom:1px solid var(--border); border-right:1px solid var(--border); }
  td:last-child { border-right:none; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:var(--surface2); }
  .notice { font-size:11px; color:var(--text3); margin-top:14px; padding-top:12px; border-top:1px solid var(--border); font-family:var(--mono); line-height:1.8; }
  .debug-toggle { font-size:11px; color:var(--text3); cursor:pointer; margin-top:8px; display:inline-block; }
  .debug-toggle:hover { color:var(--text2); }
  .debug-box { display:none; background:var(--bg); border:1px solid var(--border); border-radius:4px; padding:10px 12px; margin-top:8px; font-family:var(--mono); font-size:11px; color:var(--text3); white-space:pre-wrap; word-break:break-all; max-height:200px; overflow-y:auto; }
  .debug-box.show { display:block; }
</style>

<script>
const FIPS={AL:'01',AK:'02',AZ:'04',AR:'05',CA:'06',CO:'08',CT:'09',DE:'10',DC:'11',FL:'12',GA:'13',HI:'15',ID:'16',IL:'17',IN:'18',IA:'19',KS:'20',KY:'21',LA:'22',ME:'23',MD:'24',MA:'25',MI:'26',MN:'27',MS:'28',MO:'29',MT:'30',NE:'31',NV:'32',NH:'33',NJ:'34',NM:'35',NY:'36',NC:'37',ND:'38',OH:'39',OK:'40',OR:'41',PA:'42',RI:'44',SC:'45',SD:'46',TN:'47',TX:'48',UT:'49',VT:'50',VA:'51',WA:'53',WV:'54',WI:'55',WY:'56'};
let currentResults={},currentKeys=[];


document.addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key==='Enter'){e.preventDefault();runLookup();}});
function addEx(v){const el=document.getElementById('districtInput');const c=el.value.trim();el.value=c?c+'\n'+v:v;el.focus();}
function clearAll(){document.getElementById('districtInput').value='';document.getElementById('statusMsg').className='status';document.getElementById('resultsCard').style.display='none';currentResults={};currentKeys=[];}
function showStatus(type,msg){const el=document.getElementById('statusMsg');el.className='status show '+type;el.innerHTML=msg;}

function parseDistricts(raw){
  return raw.split(/[\n,;]+/).map(s=>s.trim()).filter(Boolean).map(t=>{
    const m=t.match(/^([A-Za-z]{2})\s+(CD|SD|HD)-?(\d{1,3})$/i);
    if(!m)return{raw:t,valid:false};
    const state=m[1].toUpperCase(),type=m[2].toUpperCase(),num=parseInt(m[3],10);
    if(!FIPS[state])return{raw:t,valid:false};
    return{raw:t,valid:true,state,type,num,key:`${state} ${type}-${num}`};
  });
}

// ─── TIGERweb layer IDs ────────────────────────────────────────────────────────
// Source: https://tigerweb.geo.census.gov/arcgis/rest/services/TIGERweb/Legislative/MapServer
// Congressional Districts 119th Congress = layer 0 (current as of 2023+)
// SLDU 2020 = layer 14 (State Legislative Districts - Upper - Census 2020)
// SLDL 2020 = layer 16 (State Legislative Districts - Lower - Census 2020)
// 
// ZCTA service: https://tigerweb.geo.census.gov/arcgis/rest/services/TIGERweb/PUMA_TAD_TAZ_UGA_ZCTA/MapServer
// ZCTA5 2020 = layer 4

// GEOID formats:
// CD: 2-char state FIPS + 2-char district = 4 chars total (e.g., FL CD-3 = "1203")
// SLDU: 2-char state FIPS + 5-char district = 7 chars total (e.g., AL SD-1 = "0100001")  
// SLDL: 2-char state FIPS + 5-char district = 7 chars total (e.g., TX HD-14 = "4800014")

const TIGER_BASE = 'https://tigerweb.geo.census.gov/arcgis/rest/services/TIGERweb';
const ZCTA_SERVICE = `${TIGER_BASE}/PUMA_TAD_TAZ_UGA_ZCTA/MapServer`;
const LEG_SERVICE = `${TIGER_BASE}/Legislative/MapServer`;

// Layer IDs to try in order (in case the primary is wrong)
const LAYER_IDS = { // CD=0 (119th), SD=1 (2024 SLDU), HD=2 (2024 SLDL)
  CD: [0, 4],        // Try 119th, 118th, 117th, 116th
  SD: [1, 5],     // Try multiple SLDU layer candidates
  HD: [2, 6],     // Try multiple SLDL layer candidates
};
const ZCTA_LAYERS = [1, 4, 7]; // ZCTA5 2020 candidates

function makeGeoid(fips, num, type){
  if(type==='CD') return fips + String(num).padStart(2,'0');   // 4 chars: FL CD-3 = "1203"
  if(type==='SD') return fips + String(num).padStart(3,'0');   // 5 chars: AL SD-1 = "01001"
  return fips + String(num).padStart(3,'0');                    // 5 chars: TX HD-14 = "48014"
}

async function tigerFetch(url){
  const ctrl=new AbortController();
  const timer=setTimeout(()=>ctrl.abort(),20000);
  try{
    const r=await fetch(url,{signal:ctrl.signal});
    clearTimeout(timer);
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    const j=await r.json();
    if(j.error)throw new Error(j.error.message||JSON.stringify(j.error));
    return j;
  }catch(e){
    clearTimeout(timer);
    if(e.name==='AbortError')throw new Error('Timeout');
    throw e;
  }
}

async function getDistrictBBox(fips, num, type){
  const geoid=makeGeoid(fips,num,type);
  const layers=LAYER_IDS[type];
  const whereClause=encodeURIComponent(`GEOID='${geoid}'`);
  
  for(const layerId of layers){
    try{
      const url=`${LEG_SERVICE}/${layerId}/query?where=${whereClause}&outFields=GEOID,NAME&returnGeometry=true&geometryPrecision=4&outSR=4326&f=json`;
      const data=await tigerFetch(url);
      
      if(!data.features||data.features.length===0){
        continue;
      }
      
      const feat=data.features[0];
      
      // Get bounding box from extent or compute from rings
      let bbox;
      if(data.extent){
        bbox=data.extent;
      } else if(feat.geometry&&feat.geometry.rings){
        bbox=ringsToBBox(feat.geometry.rings);
      }
      
      if(!bbox)throw new Error('No geometry extent');
      return bbox;
    }catch(e){
    }
  }
  throw new Error(`District not found in TIGERweb (tried layers ${layers.join(',')})`);
}

function ringsToBBox(rings){
  let xmin=Infinity,ymin=Infinity,xmax=-Infinity,ymax=-Infinity;
  for(const ring of rings)for(const [x,y] of ring){
    if(x<xmin)xmin=x;if(x>xmax)xmax=x;
    if(y<ymin)ymin=y;if(y>ymax)ymax=y;
  }
  return{xmin,ymin,xmax,ymax};
}

async function getZCTAsInBBox(bbox){
  const geomParam=encodeURIComponent(JSON.stringify({
    xmin:bbox.xmin,ymin:bbox.ymin,xmax:bbox.xmax,ymax:bbox.ymax,
    spatialReference:{wkid:4326}
  }));
  
  for(const layerId of ZCTA_LAYERS){
    try{
      const url=`${ZCTA_SERVICE}/${layerId}/query?geometry=${geomParam}&geometryType=esriGeometryEnvelope&spatialRel=esriSpatialRelIntersects&outFields=ZCTA5,GEOID&returnGeometry=false&resultRecordCount=2000&f=json`;
      const data=await tigerFetch(url);
      
      if(!data.features||data.features.length===0){
        continue;
      }
      const zips=data.features.map(f=>{
        const a=f.attributes;
        return a.ZCTA5||a.GEOID||a.GEOID20||a.ZCTA5CE20||'';
      }).filter(z=>/^\d{5}$/.test(z)).sort();
      
      return[...new Set(zips)];
    }catch(e){
    }
  }
  throw new Error('Could not query ZCTAs from TIGERweb');
}

async function fetchZIPs(d){
  const fips=FIPS[d.state];
  const bbox=await getDistrictBBox(fips,d.num,d.type);
  return getZCTAsInBBox(bbox);
}

async function runLookup(){
  const raw=document.getElementById('districtInput').value;
  if(!raw.trim())return;
    const parsed=parseDistricts(raw);
  const valid=parsed.filter(d=>d.valid);
  const invalid=parsed.filter(d=>!d.valid);
  if(!valid.length){showStatus('error','&#9888; No valid districts found.<br><small>Format: FL CD-3 &middot; AL SD-1 &middot; TX HD-14</small>');return;}
  const seen=new Set();
  const deduped=valid.filter(d=>{if(seen.has(d.key))return false;seen.add(d.key);return true;});
  
  showStatus('loading',`<span class="spinner"></span>Looking up ${deduped.length} district${deduped.length>1?'s':''}...<div class="progress-bar-wrap"><div class="progress-bar" id="progBar"></div></div>`);
  document.getElementById('lookupBtn').disabled=true;
  document.getElementById('resultsCard').style.display='none';
  currentResults={};currentKeys=deduped.map(d=>d.key);
  const errors=[];let done=0;
  
  for(const d of deduped){
    try{
      currentResults[d.key]=await fetchZIPs(d);
    }catch(e){
      currentResults[d.key]=[];
      errors.push(`${d.key}: ${e.message}`);
    }
    done++;
    const bar=document.getElementById('progBar');
    if(bar)bar.style.width=Math.round((done/deduped.length)*100)+'%';
  }
  
  document.getElementById('lookupBtn').disabled=false;
  const total=Object.values(currentResults).reduce((a,b)=>a+b.length,0);
  const ok=Object.values(currentResults).filter(z=>z.length>0).length;
  
  if(ok===0&&errors.length>0){
    showStatus('error',`&#9888; All lookups failed. Check debug log below for details.<br><small>${errors.slice(0,3).join('<br>')}</small>`);
    return;
  }
  
  const skipMsg=invalid.length?` &middot; Skipped: ${invalid.map(d=>d.raw).join(', ')}`:'';
  const errMsg=errors.length?` &middot; ${errors.length} error(s)`:'';
  showStatus(errors.length?'warn':'success',`&#10003; Found ${total.toLocaleString()} ZIPs across ${ok}/${deduped.length} district${deduped.length>1?'s':''}.${errMsg}${skipMsg}`);
  renderResults(invalid,errors);
}

function renderResults(invalid=[],errors=[]){
  const keys=currentKeys;
  const maxRows=Math.max(...keys.map(k=>(currentResults[k]||[]).length),0);
  document.getElementById('tagRow').innerHTML=
    keys.map(k=>{const n=(currentResults[k]||[]).length;const hasErr=errors.some(e=>e.startsWith(k+':'));return`<div class="dtag${n===0?' empty':''}"><span>${k}</span><span class="count">${hasErr?'&#9888; error':n+' ZIPs'}</span></div>`;}).join('')+
    invalid.map(d=>`<div class="dtag empty">${d.raw} <span class="count">&#10007;</span></div>`).join('');
  document.getElementById('totalPill').textContent=Object.values(currentResults).reduce((a,b)=>a+b.length,0).toLocaleString()+' ZIPs';
  document.getElementById('tableHead').innerHTML=`<tr>${keys.map(k=>`<th>${k}</th>`).join('')}</tr>`;
  const preview=Math.min(maxRows,500);
  let rows='';
  for(let i=0;i<preview;i++){rows+=`<tr>${keys.map(k=>`<td>${(currentResults[k]||[])[i]||''}</td>`).join('')}</tr>`;}
  if(maxRows>500)rows+=`<tr>${keys.map(()=>`<td style="color:var(--text3);font-size:11px">...more in CSV</td>`).join('')}</tr>`;
  document.getElementById('tableBody').innerHTML=rows;
  const notices=[
    'Source: U.S. Census Bureau TIGERweb REST API (2024 legislative boundaries).',
    'ZIPs reflect ZCTAs (ZIP Code Tabulation Areas) intersecting each district bounding box.',
    'Bounding-box method: may include a small number of ZCTAs near district edges. Verify targeting lists before launch.',
  ];
  if(maxRows>500)notices.push(`Table preview capped at 500 rows. Full ${maxRows.toLocaleString()} ZIPs in the CSV.`);
  document.getElementById('noticeBlock').innerHTML=notices.join('<br>');
  document.getElementById('resultsCard').style.display='block';
}

function downloadCSV(){
  const keys=currentKeys.filter(k=>currentResults[k]);
  if(!keys.length)return;
  const maxRows=Math.max(...keys.map(k=>(currentResults[k]||[]).length),0);
  let csv=keys.join(',')+'\r\n';
  for(let i=0;i<maxRows;i++){csv+=keys.map(k=>(currentResults[k]||[])[i]||'').join(',')+'\r\n';}
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;
  a.download=`district_zips_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}
