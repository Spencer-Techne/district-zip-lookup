<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>District → ZIP Lookup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #010101; --surface: #111111; --surface2: #1a1a1a;
    --border: #2a2a2a; --border2: #333333;
    --text: #f0ede6; --text2: #8c8c8c; --text3: #4a4a4a;
    --accent: #d99e32; --accent-dim: #2a1f08;
    --green: #2ecc8a; --green-dim: #0d2e20;
    --yellow: #d99e32; --yellow-dim: #2a1f08;
    --red: #f05252; --red-dim: #2a1010;
    --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans', sans-serif;
  }
  body { background:var(--bg); color:var(--text); font-family:var(--sans); font-size:14px; min-height:100vh; padding:40px 24px; line-height:1.5; }
  .wrap { max-width:880px; margin:0 auto; }
  .header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:36px; gap:16px; }
  .eyebrow { font-family:var(--mono); font-size:10px; letter-spacing:.12em; color:var(--accent); text-transform:uppercase; margin-bottom:6px; }
  h1 { font-size:26px; font-weight:600; color:#fff; letter-spacing:-.02em; line-height:1.2; }
  .sub { font-size:13px; color:var(--text2); margin-top:5px; }
  .ver-badge { font-family:var(--mono); font-size:10px; color:var(--text3); border:1px solid var(--border2); padding:3px 8px; border-radius:4px; white-space:nowrap; margin-top:4px; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:22px 24px; margin-bottom:16px; }
  .field-label { font-family:var(--mono); font-size:10px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--text2); margin-bottom:8px; display:block; }
  textarea { width:100%; background:var(--bg); border:1px solid var(--border2); border-radius:6px; color:var(--text); font-family:var(--mono); font-size:13px; padding:12px 14px; resize:vertical; min-height:90px; outline:none; transition:border-color .15s; line-height:1.7; }
  textarea:focus { border-color:var(--accent); }
  textarea::placeholder { color:var(--text3); }
  .hint-row { display:flex; align-items:flex-start; gap:20px; margin-top:10px; flex-wrap:wrap; }
  .hint { font-size:12px; color:var(--text3); }
  .format-chips { display:flex; gap:6px; flex-wrap:wrap; }
  .chip { font-family:var(--mono); font-size:11px; background:var(--surface2); border:1px solid var(--border2); color:var(--text2); padding:2px 8px; border-radius:3px; cursor:pointer; transition:all .12s; }
  .chip:hover { border-color:var(--accent); color:var(--accent); }
  .btn-row { display:flex; gap:8px; margin-top:16px; align-items:center; flex-wrap:wrap; }
  button { font-family:var(--sans); font-size:13px; font-weight:600; border:none; border-radius:5px; padding:9px 18px; cursor:pointer; transition:all .12s; display:inline-flex; align-items:center; gap:6px; }
  .btn-primary { background:var(--accent); color:#000; }
  .btn-primary:hover { background:#c08a24; }
  .btn-primary:disabled { background:var(--surface2); color:var(--text3); cursor:not-allowed; }
  .btn-ghost { background:transparent; color:var(--text2); border:1px solid var(--border2); }
  .btn-ghost:hover { border-color:var(--border); color:var(--text); }
  .btn-dl { background:var(--green-dim); color:var(--green); border:1px solid #1a5c3f; margin-left:auto; }
  .btn-dl:hover { background:#0f3d28; }
  .status { font-size:13px; padding:10px 14px; border-radius:6px; margin-top:12px; display:none; font-family:var(--mono); line-height:1.8; }
  .status.show { display:block; }
  .status.loading { background:var(--accent-dim); color:#d4b060; border:1px solid #4a3510; }
  .status.error { background:var(--red-dim); color:#fca5a5; border:1px solid #6b1c1c; }
  .status.success { background:var(--green-dim); color:#86efac; border:1px solid #14532d; }
  .status.warn { background:var(--yellow-dim); color:#fde68a; border:1px solid #713f12; }
  .spinner { display:inline-block; width:11px; height:11px; border:2px solid #2a1f08; border-top-color:#d99e32; border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; margin-right:4px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .progress-bar-wrap { background:var(--accent-dim); border-radius:3px; height:4px; margin-top:8px; overflow:hidden; }
  .progress-bar { background:var(--accent); height:100%; border-radius:3px; transition:width .3s ease; width:0%; }
  .results-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:10px; }
  .results-title { font-size:13px; font-weight:600; color:var(--text); display:flex; align-items:center; gap:8px; }
  .pill { font-family:var(--mono); font-size:10px; padding:2px 8px; border-radius:3px; background:var(--accent-dim); color:var(--accent); border:1px solid #4a3510; }
  .pill.green { background:var(--green-dim); color:var(--green); border-color:#14532d; }
  .district-tags { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px; }
  .dtag { font-family:var(--mono); font-size:11px; padding:3px 10px; border-radius:3px; background:var(--surface2); border:1px solid var(--border2); color:var(--text2); display:flex; align-items:center; gap:6px; }
  .dtag .count { color:var(--text3); }
  .dtag.empty { border-color:#6b1c1c; color:var(--red); }
  .table-wrap { overflow-x:auto; border-radius:6px; border:1px solid var(--border); max-height:420px; overflow-y:auto; }
  table { width:100%; border-collapse:collapse; font-family:var(--mono); font-size:13px; }
  th { background:var(--surface2); color:var(--text2); font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.08em; padding:9px 16px; text-align:left; border-bottom:1px solid var(--border); white-space:nowrap; border-right:1px solid var(--border); position:sticky; top:0; }
  th:last-child { border-right:none; }
  td { padding:5px 16px; color:var(--text); border-bottom:1px solid var(--border); border-right:1px solid var(--border); }
  td:last-child { border-right:none; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:var(--surface2); }
  .notice { font-size:11px; color:var(--text3); margin-top:14px; padding-top:12px; border-top:1px solid var(--border); font-family:var(--mono); line-height:1.8; }
  .debug-toggle { font-size:11px; color:var(--text3); cursor:pointer; margin-top:8px; display:inline-block; user-select:none; }
  .debug-toggle:hover { color:var(--text2); }
  .debug-box { display:none; background:var(--bg); border:1px solid var(--border); border-radius:4px; padding:10px 12px; margin-top:8px; font-family:var(--mono); font-size:11px; color:var(--text3); white-space:pre-wrap; word-break:break-all; max-height:200px; overflow-y:auto; }
  .debug-box.show { display:block; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div>
      <div class="eyebrow">Techne Media &middot; Targeting Tool</div>
      <h1>District &rarr; ZIP Lookup</h1>
      <div class="sub">Enter legislative or congressional districts. Export ZIPs as a CSV.</div>
    </div>
    <div class="ver-badge">TIGERweb &middot; v10</div>
  </div>

  <div class="card">
    <label class="field-label">Districts</label>
    <textarea id="districtInput" placeholder="AL SD-1&#10;FL CD-3&#10;TX HD-14, NJ CD-7&#10;&#10;One per line or comma-separated"></textarea>
    <div class="hint-row">
      <div class="hint">Types: <strong style="color:var(--text2)">CD</strong> Congressional &nbsp;&middot;&nbsp; <strong style="color:var(--text2)">SD</strong> State Senate &nbsp;&middot;&nbsp; <strong style="color:var(--text2)">HD</strong> State House</div>
      <div class="format-chips">
        <span class="chip" onclick="addEx('FL CD-3')">FL CD-3</span>
        <span class="chip" onclick="addEx('AL SD-1')">AL SD-1</span>
        <span class="chip" onclick="addEx('TX HD-14')">TX HD-14</span>
        <span class="chip" onclick="addEx('NJ CD-7')">NJ CD-7</span>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-primary" id="lookupBtn" onclick="runLookup()">&#9654; Look Up ZIPs</button>
      <button class="btn-ghost" onclick="clearAll()">Clear</button>
      <span style="font-size:12px;color:var(--text3);margin-left:4px;">&#8984;&#8617; to run</span>
    </div>
    <div class="status" id="statusMsg"></div>
    <span class="debug-toggle" id="debugToggle" onclick="toggleDebug()">&#9660; show debug log</span>
    <div class="debug-box" id="debugBox"></div>
  </div>

  <div class="card" id="resultsCard" style="display:none">
    <div class="results-header">
      <div class="results-title">Results <span class="pill green" id="totalPill"></span></div>
      <button class="btn-dl" onclick="downloadCSV()">&darr; Download CSV</button>
    </div>
    <div class="district-tags" id="tagRow"></div>
    <div class="table-wrap">
      <table><thead id="tableHead"></thead><tbody id="tableBody"></tbody></table>
    </div>
    <div class="notice" id="noticeBlock"></div>
  </div>
</div>

<script>
// ─── State FIPS lookup ───────────────────────────────────────────────────────
const FIPS = {
  AL:'01',AK:'02',AZ:'04',AR:'05',CA:'06',CO:'08',CT:'09',DE:'10',DC:'11',
  FL:'12',GA:'13',HI:'15',ID:'16',IL:'17',IN:'18',IA:'19',KS:'20',KY:'21',
  LA:'22',ME:'23',MD:'24',MA:'25',MI:'26',MN:'27',MS:'28',MO:'29',MT:'30',
  NE:'31',NV:'32',NH:'33',NJ:'34',NM:'35',NY:'36',NC:'37',ND:'38',OH:'39',
  OK:'40',OR:'41',PA:'42',RI:'44',SC:'45',SD:'46',TN:'47',TX:'48',UT:'49',
  VT:'50',VA:'51',WA:'53',WV:'54',WI:'55',WY:'56'
};

let currentResults = {}, currentKeys = [], debugLines = [];

// ─── Debug helpers ───────────────────────────────────────────────────────────
function dbg(msg) {
  debugLines.push('[' + new Date().toISOString().slice(11,23) + '] ' + msg);
  const box = document.getElementById('debugBox');
  if (box) { box.textContent = debugLines.join('\n'); box.scrollTop = box.scrollHeight; }
}

function toggleDebug() {
  const box = document.getElementById('debugBox');
  const tog = document.getElementById('debugToggle');
  box.classList.toggle('show');
  tog.textContent = box.classList.contains('show') ? '▲ hide debug log' : '▼ show debug log';
}

// ─── Keyboard shortcut ───────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); runLookup(); }
});

function addEx(v) {
  const el = document.getElementById('districtInput');
  const c = el.value.trim();
  el.value = c ? c + '\n' + v : v;
  el.focus();
}

function clearAll() {
  document.getElementById('districtInput').value = '';
  document.getElementById('statusMsg').className = 'status';
  document.getElementById('resultsCard').style.display = 'none';
  currentResults = {}; currentKeys = []; debugLines = [];
  document.getElementById('debugBox').textContent = '';
}

function showStatus(type, msg) {
  const el = document.getElementById('statusMsg');
  el.className = 'status show ' + type;
  el.innerHTML = msg;
}

// ─── Parse district input ────────────────────────────────────────────────────
function parseDistricts(raw) {
  return raw.split(/[\n,;]+/).map(s => s.trim()).filter(Boolean).map(t => {
    const m = t.match(/^([A-Za-z]{2})\s+(CD|SD|HD)-?(\d{1,3})$/i);
    if (!m) return { raw: t, valid: false };
    const state = m[1].toUpperCase(), type = m[2].toUpperCase(), num = parseInt(m[3], 10);
    if (!FIPS[state]) return { raw: t, valid: false };
    return { raw: t, valid: true, state, type, num, key: `${state} ${type}-${num}` };
  });
}

// ─── TIGERweb endpoints ──────────────────────────────────────────────────────
// Source: https://tigerweb.geo.census.gov/arcgis/rest/services/TIGERweb/
const TIGER_BASE   = 'https://tigerweb.geo.census.gov/arcgis/rest/services/TIGERweb';
const TIGER_ROOT   = 'https://tigerweb.geo.census.gov/arcgis/rest/services';
const ZCTA_SERVICE = `${TIGER_BASE}/PUMA_TAD_TAZ_UGA_ZCTA/MapServer`;
const LEG_SERVICE  = `${TIGER_BASE}/Legislative/MapServer`;

// Layer IDs tried in order per district type.
// CD: 119th Congress (layer 0), then fallbacks
// SD: SLDU 2020 (layer 14), fallbacks
// HD: SLDL 2020 (layer 16), fallbacks
const LAYER_IDS = {
  CD: [0],   // 119th Congressional Districts
  SD: [1],   // 2024 State Legislative Districts - Upper
  HD: [2],   // 2024 State Legislative Districts - Lower
};

// ZCTA layer IDs — layer 11 is "ZIP Code Tabulation Areas" in TIGERweb current service
const ZCTA_LAYERS = [11, 4, 2, 0];

// ─── GEOID construction ──────────────────────────────────────────────────────
// FIX: SLDU/SLDL GEOIDs are 7 chars (2 FIPS + 5 district), not 5.
// CD GEOIDs are 4 chars (2 FIPS + 2 district).
function makeGeoid(fips, num, type) {
  if (type === 'CD') return fips + String(num).padStart(2, '0');  // 4 chars (e.g. '1203')
  if (type === 'SD') return fips + String(num).padStart(3, '0');  // 5 chars (e.g. '01001')
  if (type === 'HD') return fips + String(num).padStart(3, '0');  // 5 chars (e.g. '48014')
  return fips + String(num).padStart(2, '0');
}

// 3-char district code used in SLDUST/SLDLST fields
function makeDistCode(num) {
  return String(num).padStart(3, '0');
}

// ─── Fetch wrapper ───────────────────────────────────────────────────────────
// Note: AbortController/AbortSignal cannot be used in sandboxed iframes.
// Using Promise.race with a manual timeout instead.
function tigerFetch(url) {
  dbg('GET ' + url.replace(TIGER_BASE, '[TIGER]'));
  const timeout = new Promise((_, reject) =>
    setTimeout(() => reject(new Error('Timeout after 25s')), 25000)
  );
  const request = fetch(url)
    .then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    })
    .then(j => {
      if (j.error) throw new Error(j.error.message || JSON.stringify(j.error));
      return j;
    });
  return Promise.race([request, timeout]);
}

// ─── Step 1: Get district polygon geometry ───────────────────────────────────
// Uses maxAllowableOffset=0.01 to get a server-simplified polygon,
// which keeps the geometry manageable for the subsequent ZCTA query.
async function getDistrictPolygon(fips, num, type) {
  const geoid = makeGeoid(fips, num, type);
  const distCode = makeDistCode(num);
  const layers = LAYER_IDS[type];

  // Build where clauses to try in order
  const whereClauses = [
    `GEOID='${geoid}'`,
    `GEOID='${fips}${distCode}'`,  // alternate padding
  ];

  for (const layerId of layers) {
    for (const where of whereClauses) {
      try {
        const url = `${LEG_SERVICE}/${layerId}/query?where=${encodeURIComponent(where)}&outFields=GEOID,NAME&returnGeometry=true&maxAllowableOffset=0.01&outSR=4326&f=json`;
        const data = await tigerFetch(url);

        if (!data.features || data.features.length === 0) {
          dbg(`Layer ${layerId} [${where}]: no features`);
          continue;
        }

        const feat = data.features[0];
        dbg(`Layer ${layerId}: found "${feat.attributes?.NAME || geoid}" via [${where}]`);

        if (!feat.geometry || !feat.geometry.rings) throw new Error('No polygon geometry returned');
        dbg(`Rings: ${feat.geometry.rings.length}, total points: ${feat.geometry.rings.reduce((a,r) => a + r.length, 0)}`);
        return feat.geometry;

      } catch(e) {
        dbg(`Layer ${layerId} [${where}] error: ${e.message}`);
      }
    }
  }
  throw new Error(`District not found in TIGERweb (tried layers: ${layers.join(', ')})`);
}

// ─── Step 2: Find ZCTAs intersecting the polygon ─────────────────────────────
// Uses POST to avoid URL length limits. Tries polygon intersect first,
// falls back to bounding box envelope if polygon is rejected.
// Targets layer 7 (ACS 2024 ZCTA) in the TIGERweb service,
// with Census2020 service layer 2 as secondary fallback.

const ZCTA_TARGETS = [
  { service: ZCTA_SERVICE, layer: 7 },   // TIGERweb ACS 2024 ZCTA
  { service: ZCTA_SERVICE, layer: 11 },  // TIGERweb current ZCTA
  { service: `${TIGER_ROOT}/Census2020/PUMA_TAD_TAZ_UGA_ZCTA/MapServer`, layer: 2 }, // Census2020 ZCTA
];

// Compute bounding box from polygon rings
function ringsToBbox(rings) {
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const ring of rings) {
    for (const [x, y] of ring) {
      if (x < minX) minX = x; if (x > maxX) maxX = x;
      if (y < minY) minY = y; if (y > maxY) maxY = y;
    }
  }
  return { xmin: minX, ymin: minY, xmax: maxX, ymax: maxY, spatialReference: { wkid: 4326 } };
}

async function postZCTAQuery(serviceUrl, layerId, geometryParam, geometryType) {
  const url = `${serviceUrl}/${layerId}/query`;
  const body = new URLSearchParams({
    geometry: JSON.stringify(geometryParam),
    geometryType,
    inSR: '4326',
    spatialRel: 'esriSpatialRelIntersects',
    outFields: 'ZCTA5,GEOID,BASENAME,NAME',
    returnGeometry: 'false',
    resultRecordCount: '2000',
    f: 'json'
  });
  dbg(`POST ${url.replace('https://tigerweb.geo.census.gov/arcgis/rest/services', '[TIGER]')} layer=${layerId} type=${geometryType}`);
  const r = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const j = await r.json();
  if (j.error) throw new Error(j.error.message || JSON.stringify(j.error));
  return j;
}

async function getZCTAsInPolygon(geometry) {
  // Thin rings: keep every 3rd vertex for polygon query
  const thinned = {
    rings: geometry.rings.map(ring => ring.filter((_, i) => i % 3 === 0 || i === ring.length - 1)),
    spatialReference: { wkid: 4326 }
  };
  const bbox = ringsToBbox(geometry.rings);
  const totalPts = thinned.rings.reduce((a, r) => a + r.length, 0);
  dbg(`Polygon: ${thinned.rings.length} rings, ${totalPts} thinned pts | bbox: ${bbox.xmin.toFixed(3)},${bbox.ymin.toFixed(3)} → ${bbox.xmax.toFixed(3)},${bbox.ymax.toFixed(3)}`);

  for (const { service, layer } of ZCTA_TARGETS) {
    // Try polygon first, then envelope fallback
    for (const [geomParam, geomType] of [
      [thinned, 'esriGeometryPolygon'],
      [bbox,    'esriGeometryEnvelope']
    ]) {
      try {
        const data = await postZCTAQuery(service, layer, geomParam, geomType);

        if (!data.features || data.features.length === 0) {
          dbg(`layer ${layer} (${geomType}): no features`);
          continue;
        }
        if (data.features.length >= 2000) {
          dbg(`⚠ layer ${layer} hit 2000-record cap — may be truncated`);
        }
        dbg(`layer ${layer} (${geomType}): ${data.features.length} ZCTAs`);

        const zips = data.features.map(f => {
          const a = f.attributes;
          return a.ZCTA5 || a.GEOID || a.BASENAME || a.NAME || '';
        }).filter(z => /^\d{5}$/.test(z)).sort();

        return [...new Set(zips)];
      } catch(e) {
        dbg(`layer ${layer} (${geomType}) error: ${e.message}`);
      }
    }
  }
  throw new Error('Could not query ZCTAs — all services and geometry types failed');
}

// ─── Main per-district fetch ──────────────────────────────────────────────────
async function fetchZIPs(d) {
  const fips = FIPS[d.state];
  dbg(`\n─── ${d.key} ───`);
  const geometry = await getDistrictPolygon(fips, d.num, d.type);
  return getZCTAsInPolygon(geometry);
}

// ─── Run lookup ───────────────────────────────────────────────────────────────
async function runLookup() {
  const raw = document.getElementById('districtInput').value;
  if (!raw.trim()) return;

  debugLines = [];
  document.getElementById('debugBox').textContent = '';

  const parsed = parseDistricts(raw);
  const valid   = parsed.filter(d => d.valid);
  const invalid = parsed.filter(d => !d.valid);

  if (!valid.length) {
    showStatus('error', '&#9888; No valid districts found.<br><small>Format: FL CD-3 &middot; AL SD-1 &middot; TX HD-14</small>');
    return;
  }

  // Deduplicate
  const seen = new Set();
  const deduped = valid.filter(d => { if (seen.has(d.key)) return false; seen.add(d.key); return true; });

  showStatus('loading', `<span class="spinner"></span>Looking up ${deduped.length} district${deduped.length > 1 ? 's' : ''}...<div class="progress-bar-wrap"><div class="progress-bar" id="progBar"></div></div>`);
  document.getElementById('lookupBtn').disabled = true;
  document.getElementById('resultsCard').style.display = 'none';

  currentResults = {};
  currentKeys = deduped.map(d => d.key);

  const errors = [];
  let done = 0;

  for (const d of deduped) {
    try {
      currentResults[d.key] = await fetchZIPs(d);
      dbg(`✓ ${d.key}: ${currentResults[d.key].length} ZIPs`);
    } catch(e) {
      currentResults[d.key] = [];
      errors.push({ key: d.key, msg: e.message });
      dbg(`✗ ${d.key} FAILED: ${e.message}`);
    }
    done++;
    const bar = document.getElementById('progBar');
    if (bar) bar.style.width = Math.round((done / deduped.length) * 100) + '%';
  }

  document.getElementById('lookupBtn').disabled = false;

  const total = Object.values(currentResults).reduce((a, b) => a + b.length, 0);
  const ok    = Object.values(currentResults).filter(z => z.length > 0).length;

  if (ok === 0 && errors.length > 0) {
    showStatus('error', `&#9888; All lookups failed. Check the debug log below.<br><small>${errors.slice(0, 3).map(e => e.key + ': ' + e.msg).join('<br>')}</small>`);
    document.getElementById('debugBox').classList.add('show');
    document.getElementById('debugToggle').textContent = '▲ hide debug log';
    return;
  }

  const skipMsg = invalid.length ? ` &middot; Skipped: ${invalid.map(d => d.raw).join(', ')}` : '';
  const errMsg  = errors.length  ? ` &middot; ${errors.length} error(s)` : '';
  showStatus(errors.length ? 'warn' : 'success',
    `&#10003; Found ${total.toLocaleString()} ZIPs across ${ok}/${deduped.length} district${deduped.length > 1 ? 's' : ''}.${errMsg}${skipMsg}`
  );

  renderResults(invalid, errors);
}

// ─── Render results table ─────────────────────────────────────────────────────
function renderResults(invalid = [], errors = []) {
  const keys    = currentKeys;
  const maxRows = Math.max(...keys.map(k => (currentResults[k] || []).length), 0);

  // District tag row
  document.getElementById('tagRow').innerHTML =
    keys.map(k => {
      const n      = (currentResults[k] || []).length;
      const hasErr = errors.some(e => e.key === k);
      return `<div class="dtag${n === 0 ? ' empty' : ''}"><span>${k}</span><span class="count">${hasErr ? '⚠ error' : n + ' ZIPs'}</span></div>`;
    }).join('') +
    invalid.map(d => `<div class="dtag empty">${d.raw} <span class="count">✗ invalid</span></div>`).join('');

  document.getElementById('totalPill').textContent =
    Object.values(currentResults).reduce((a, b) => a + b.length, 0).toLocaleString() + ' ZIPs';

  // Table header
  document.getElementById('tableHead').innerHTML =
    `<tr>${keys.map(k => `<th>${k}</th>`).join('')}</tr>`;

  // Table rows (preview capped at 500)
  const preview = Math.min(maxRows, 500);
  let rows = '';
  for (let i = 0; i < preview; i++) {
    rows += `<tr>${keys.map(k => `<td>${(currentResults[k] || [])[i] || ''}</td>`).join('')}</tr>`;
  }
  if (maxRows > 500) {
    rows += `<tr>${keys.map(() => `<td style="color:var(--text3);font-size:11px">… more in CSV</td>`).join('')}</tr>`;
  }
  document.getElementById('tableBody').innerHTML = rows;

  // Notices
  const capHit = Object.values(currentResults).some(z => z.length >= 200);
  const notices = [
    'Source: U.S. Census Bureau TIGERweb REST API — 2020 geographic boundaries.',
    'ZIPs reflect ZCTAs (ZIP Code Tabulation Areas) intersecting each district polygon.',
    'Note: polygon intersection may include ZCTAs that partially overlap district borders — verify targeting.',
  ];
  if (capHit) notices.push('⚠ One or more districts returned 200+ ZCTAs. The TIGERweb API caps results at 2000 records — dense urban districts may be truncated. Cross-check manually.');
  if (maxRows > 500) notices.push(`Table preview capped at 500 rows. Full ${maxRows.toLocaleString()} ZIPs available in the CSV download.`);

  document.getElementById('noticeBlock').innerHTML = notices.join('<br>');
  document.getElementById('resultsCard').style.display = 'block';
}

// ─── CSV download ─────────────────────────────────────────────────────────────
function downloadCSV() {
  const keys = currentKeys.filter(k => currentResults[k]);
  if (!keys.length) return;
  const maxRows = Math.max(...keys.map(k => (currentResults[k] || []).length), 0);
  let csv = keys.join(',') + '\r\n';
  for (let i = 0; i < maxRows; i++) {
    csv += keys.map(k => (currentResults[k] || [])[i] || '').join(',') + '\r\n';
  }
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `district_zips_${new Date().toISOString().slice(0, 10)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
</script>
